services:
  - type: web
    name: automatte-nanobot
    runtime: docker
    plan: free
    region: singapore
    envVars:
      # ── Core secrets ───────────────────────────────────────────
      # Provide ONE or the other (or both — OpenRouter takes precedence):
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # ── Optional: override the auto-detected default model ──────
      - key: NANOBOT_MODEL
        value: ""               # leave blank to use the provider's default
      # ── Standard ───────────────────────────────────────────────
      - key: TELEGRAM_TOKEN
        sync: false
      - key: RCLONE_CONFIG_BASE64
        sync: false
      - key: PORT
        value: "10000"

      # ── Email channel (uncomment & fill in to enable) ──────────
      # See .env.example.nvidia or .env.example.openrouter for the
      # full list of optional e‑mail vars.
      # Only IMAP_HOST, IMAP_USERNAME, IMAP_PASSWORD,
      #        SMTP_HOST, SMTP_USERNAME, SMTP_PASSWORD are required.
      #
      # - key: IMAP_HOST
      #   value: ""
      # - key: IMAP_USERNAME
      #   value: ""
      # - key: IMAP_PASSWORD
      #   sync: false
      # - key: SMTP_HOST
      #   value: ""
      # - key: SMTP_USERNAME
      #   value: ""
      # - key: SMTP_PASSWORD
      #   sync: false
      # - key: FROM_ADDRESS
      #   value: ""
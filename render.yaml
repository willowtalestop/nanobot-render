services:
  - type: web
    name: automatte-nanobot
    runtime: docker
    plan: free
    region: singapore
    envVars:
      # ── Core secrets ───────────────────────────────────────────
      - key: TELEGRAM_TOKEN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
- key: LLM_PROVIDER
          value: "openrouter"
      - key: NANOBOT_MODEL
        value: "minimaxai/minimax-m2.7" # Switched to MiniMax for speed
      - key: RCLONE_CONFIG_BASE64
        sync: false
      - key: PORT
        value: "10000"

      # ── Email channel (uncomment & fill in to enable) ──────────
      # See .env.example for the full list of optional e‑mail vars.
      # Only IMAP_HOST, IMAP_USERNAME, IMAP_PASSWORD,
      #        SMTP_HOST, SMTP_USERNAME, SMTP_PASSWORD are required.
      #
      # - key: IMAP_HOST
      #   value: ""
      # - key: IMAP_USERNAME
      #   value: ""
      # - key: IMAP_PASSWORD
      #   sync: false
      # - key: SMTP_HOST
      #   value: ""
      # - key: SMTP_USERNAME
      #   value: ""
      # - key: SMTP_PASSWORD
      #   sync: false
      # - key: FROM_ADDRESS
      #   value: ""
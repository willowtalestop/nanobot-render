services:
  - type: web
    name: automatte-nanobot
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NANOBOT_MODEL
        value: "qwen/qwen3.5-397b-a17b" # Updated Model
      - key: RCLONE_CONFIG_BASE64
        sync: false
      - key: PORT
        value: "10000"
services:
  - type: web # Changed from worker to web
    name: automatte-nanobot
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NANOBOT_MODEL
        value: "nvidia/llama-3.1-8b-instruct"
      - key: RCLONE_CONFIG_BASE64
        sync: false
      - key: PORT # Render requires the app to listen on a port
        value: "10000"
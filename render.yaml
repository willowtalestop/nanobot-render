services:
  - type: web
    name: automatte-nanobot
    runtime: docker
    plan: free
    region: singapore
    envVars:
      # ── Core secrets ───────────────────────────────────────────
      # Provide ONE or the other (or both — OpenRouter takes precedence):
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # ── Optional: override the auto-detected default model ──────
      - key: NANOBOT_MODEL
        value: ""
      # ── Standard ───────────────────────────────────────────────
      - key: TELEGRAM_TOKEN
        sync: false
      - key: RCLONE_CONFIG_BASE64
        sync: false
      - key: PORT
        value: "10000"

      # ── Email channel (uncomment & fill in to enable) ──────────
      # All 6 marked (*) are required; the rest are optional.
      # Uncomment, fill in, then redeploy.
      #
      # - key: IMAP_HOST
      #   value: "imap.gmail.com"
      # - key: IMAP_USERNAME
      #   value: "you@gmail.com"
      # - key: IMAP_PASSWORD
      #   sync: false
      # - key: SMTP_HOST
      #   value: "smtp.gmail.com"
      # - key: SMTP_USERNAME
      #   value: "you@gmail.com"
      # - key: SMTP_PASSWORD
      #   sync: false
      # - key: FROM_ADDRESS
      #   value: "you@gmail.com"
      # - key: IMAP_PORT
      #   value: "993"
      # - key: IMAP_MAILBOX
      #   value: "INBOX"
      # - key: IMAP_USE_SSL
      #   value: "true"
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USE_TLS
      #   value: "true"
      # - key: SMTP_USE_SSL
      #   value: "false"
      # - key: AUTO_REPLY_ENABLED
      #   value: "true"
      # - key: POLL_INTERVAL
      #   value: "30"
      # - key: MARK_SEEN
      #   value: "true"
      # - key: MAX_BODY_CHARS
      #   value: "12000"
      # - key: SUBJECT_PREFIX
      #   value: "Re: "
      # - key: VERIFY_DKIM
      #   value: "true"
      # - key: VERIFY_SPF
      #   value: "true"
      # - key: ALLOWED_ATTACHMENT_TYPES
      #   value: "[\"*\"]"
